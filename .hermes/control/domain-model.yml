schema: hermes/domain-model/v1
purpose: semantic contract from father Hermes to child Hermes; future agents must use this before interpreting project intent
father_child_bridge:
  father_understanding: "the father scaffolded this app harness from a static inspection of sircom-madeinfrance; it did not run the code"
  child_operational_meaning: "change ONLY what behavior-contract.yml:change lists with status confirmed, preserve ONLY what :preserve lists with status confirmed; proposed entries await human confirmation; unclassified behavior stops with a human-decisions question"
  must_ask_if_unclear:
    - which behaviors are product value (preserve) versus defects (change)
terms: []
entities: []
invariants: []
ambiguous_terms: []
forbidden_misreadings:
  - do not treat "scaffolded harness" as "verified or production-ready"
mutation_rule: changes to this file follow .hermes/control/mutation-policy.yml; do not silently reinterpret domain terms
