schema: hermes/gates/v1
authority: father-runtime
runtime_root: "${PDHB_FATHER_ROOT}"
note: "Set PDHB_FATHER_ROOT to the Father Hermes checkout; gates are executed from the child PoC root."
gates:
  validate:
    purpose: "Check child-pack coherence before bounded work."
    command: "python3 \"$PDHB_FATHER_ROOT/runtime/validate.py\" --poc-repo \"$PWD\" --require-classification --require-signed-confirmation"
    argv:
      - "$PYTHON"
      - "$PDHB_FATHER_ROOT/runtime/validate.py"
      - "--poc-repo"
      - "$PWD"
      - "--require-classification"
      - "--require-signed-confirmation"
  observe:
    purpose: "Observe a worker diff against route scope, confirmed behavior and budgets, with policy-selected sealed oracle replay."
    command: "python3 \"$PDHB_FATHER_ROOT/runtime/diff_observer.py\" --poc-repo \"$PWD\" --route <route-id> --baseline-ref <baseline-ref> --require-confirmed <behavior-id> $ORACLE_ARGS"
    argv:
      - "$PYTHON"
      - "$PDHB_FATHER_ROOT/runtime/diff_observer.py"
      - "--poc-repo"
      - "$PWD"
      - "--route"
      - "$ROUTE_ID"
      - "--baseline-ref"
      - "$BASELINE_REF"
      - "$REQUIRE_CONFIRMED_ARGS"
      - "$ORACLE_ARGS"
      - "$CHANGE_PROBE_ARGS"
      - "$REQUIRE_SANDBOX_ARGS"
  static:
    purpose: "Block-only static security scanners over observer-verified changed paths."
    class: "block-only-static"
    command: "operator-run: static scanners from this class receive the observation's changed paths constrained by allowed_paths; missing tools are explicit neutral."
    scanners:
      semgrep:
        argv: ["semgrep", "scan", "--quiet", "--error", "--json", "$STATIC_PATHS"]
        path_globs: ["*"]
        block_exit_codes: [1]
        missing: "neutral"
      bandit:
        argv: ["bandit", "-q", "-f", "json", "$STATIC_PATHS"]
        path_globs: ["*.py", "**/*.py"]
        block_exit_codes: [1]
        missing: "neutral"
      gitleaks:
        argv: ["gitleaks", "dir", "--no-banner", "--redact", "--report-format", "json", "$STATIC_PATHS"]
        path_globs: ["*"]
        block_exit_codes: [1]
        missing: "neutral"
      pip-audit:
        argv: ["pip-audit", "$STATIC_PATH_ARGS"]
        path_arg_prefix: "--requirement"
        path_globs: ["requirements*.txt", "**/requirements*.txt"]
        block_exit_codes: [1]
        missing: "neutral"
  judge:
    purpose: "Apply the veto-only second-model judge to a passed observation."
    command: "python3 \"$PDHB_FATHER_ROOT/runtime/judge_gate.py\" --poc-repo \"$PWD\" --observation <observation.json> --verdict <judge-verdict.json> --worker-engine <engine-id> --task <queued-task-instruction>"
    argv:
      - "$PYTHON"
      - "$PDHB_FATHER_ROOT/runtime/judge_gate.py"
      - "--poc-repo"
      - "$PWD"
      - "--observation"
      - "$OBSERVATION"
      - "$VERDICT_ARGS"
      - "--worker-engine"
      - "$WORKER_ENGINE"
      - "$ROUTE_ARGS"
      - "$REQUIRE_CONFIRMED_ARGS"
  mutate:
    purpose: "Admit or refuse a proposed harness mutation under policy_version CAS."
    command: "python3 \"$PDHB_FATHER_ROOT/runtime/mutation_admission.py\" --poc-repo \"$PWD\" --proposal <proposal.yml>"
    argv:
      - "$PYTHON"
      - "$PDHB_FATHER_ROOT/runtime/mutation_admission.py"
      - "--poc-repo"
      - "$PWD"
      - "--proposal"
      - "$PROPOSAL"
  browser:
    purpose: "Run the pack's browser scenarios on UI routes before merge; a scenario that did not really run stays manual_required."
    class: "route-scoped"
    routes: ["ui-verification"]
    command: "operator-run: browser_gate evaluates .hermes/control/browser-scenarios.yml with the configured agent-browser cmd; a missing driver on a declared gate is a broken install, not a neutral skip."
