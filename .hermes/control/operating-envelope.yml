schema: hermes/operating-envelope/v1
# Enforceable operating assumptions of THIS child pack. Harnesses encode
# model/effort/sandbox assumptions; this file declares them, the runtime enforces
# what it can and echoes the rest. Changing it is a governance mutation: it needs
# an out-of-band human approval, never a child self-edit.
status: generated-default   # generated-default | human-confirmed (a human confirms or adjusts out of band)
verification:
  require_sealed_oracles_for_acceptance: true    # judge gate blocks acceptance when the observation has no sealed-oracle probe (spec S24/S29)
  # A probe with network access can ask a local service — or the internet — what verdict to
  # return, and neither the diff nor any gate would show it. The cut is PROVEN (the net
  # namespace inode must actually change), never assumed. Set to false only by an explicit,
  # out-of-band human decision: it reopens a channel the diff cannot show, and the verdict
  # stops being a function of the diff alone.
  require_network_sandbox_for_probes: true       # the observer refuses to run any probe without the proven network cut (spec S28)
determinism:
  # The exact promise this pack makes: same diff + same sealed envelope -> same decision.
  # Channels the observer CLOSES for probes — each has a permanent test that fails if it reopens:
  #   files    — probes run in a tree materialised from the git surface (_observed_tree)
  #   env      — pinned allowlist; nothing ambient reaches a probe (PROBE_ENV_PINNED/_PASSTHROUGH)
  #   tmp      — private, empty TMPDIR per probe, removed afterwards
  #   network  — proven namespace cut, required by default (verification above)
  # Channels that stay OPEN to a python-stdout oracle and are accepted as envelope. No harness
  # can close them for arbitrary Python without faking the machine itself; an oracle that reads
  # them trades its own replayability, knowingly:
  open_channels: [clock, randomness, machine-identity, absolute-paths-outside-the-repo]
context:
  max_route_files: null    # optional pack-wide ceiling over every route's budgets.max_declared_context_files
  max_route_bytes: null    # optional pack-wide ceiling over every route's budgets.max_declared_context_bytes
compatibility:
  effort_level: null       # metadata only: echoed by observer/judge output, never enforced (no host can enforce it yet)
