parent_reentry:
  father_profile: Hermes Bootstrap Profile
  preferred_mode: socratic-questioning
  allowed_when:
    - child profile structurally broken
    - major project pivot
    - external cold review requested by human
    - profile drift suspected (human-initiated, never a parent self-watch loop)
  forbidden:
    - hidden monitoring
    - permanent governance loop
    - readiness report
    - validation-of-validation
mutation:
  policy: .hermes/control/mutation-policy.yml
  policy_version: 1  # monotonic (spec §23): any governance-core change bumps it; a mutation computed against a stale version is refused (compare-and-swap)
  default: child may self-mutate only under policy; human required for objective/tool broadening/preserve-change changes
engines:
  default:
    - codex
    - claude
  sensitive: []  # human must name sovereign engines before bounded work on sensitive data
  secret: []     # human must name sovereign engines before bounded work on secret data
note: Hermes routes and visibly monitors; the engines bound to each routed child in control/engine-plan.yml execute bounded work.
