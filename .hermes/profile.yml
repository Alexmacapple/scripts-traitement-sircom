schema: hermes/profile/v2  # v2: harness -> control_files key (the folder is .hermes/control/), mutation.policy_version added
role: "generated harness of children: routed project agents, visible monitor and controlled mutator"
role_glossary:
  children: routed agents/roles selected by the task router; not one singular child agent
  monitor: visible self-watch via git diff, human-decisions and explicit father questions; never a hidden loop or daemon
authority:
  id: "360b34453da80a7837bd664d20b3cf5c3f6f0c682d1af5b46eb0a7b285d538b0"  # stable random pack identity; never derived from the checkout path
  epoch: 1  # monotone authority generation; signed payloads bind both fields
father:
  # who created this child — so the child knows its lineage and can recall the father explicitly
  repo: "bacoco/Loriq"
  profile: profiles/hermes-bootstrap-profile.md
  grandparent: bacoco/olympe-ai-factory-starter  # Olympe: Argos supervises, Hermes is the local engine
  generated_at: "2026-07-23T20:10:43Z"
  generated_commit: "549dec4"
inherits:
  # child harness = inherited father harness + the generated harness below + child mutations over time
  # the father TRANSMITS these rules into THIS repo so the child is self-contained and understands them:
  father_harness:
    - .hermes/inherited/pdd.md
    - .hermes/inherited/pdg.md
    - .hermes/inherited/shipguard.md
    - .hermes/inherited/gbrain.md
    - .hermes/inherited/grillme.md
